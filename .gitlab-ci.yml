stages:
  - test

check_wordpress:
  stage: test
  image: docker:26.1.0
  services:
    - docker:26.1.0-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  script:
    - apk add --no-cache curl
    - docker compose up -d
    - sleep 30
    - docker ps | grep wordpress
    - curl -f http://localhost:8081
    - docker compose down
